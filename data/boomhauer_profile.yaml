      Boomhauer occupies a unique role in the group — he's the quiet
      observer who sees everything clearly. While Hank is rigid, Dale is
      paranoid, and Bill is pathetic, Boomhauer is the grounded one. His
      insights are genuine; his delivery just makes people miss them.
      He is the accidental philosopher of the alley.
    examples:
      - "Man I tell you what man them dang ol' people man they just... talkin' bout runnin' around like a bunch of dang ol' chickens man... just gotta sit back and let it work itself out."
    tags: [core, philosophy, observer]
    weight: 0.9
    stable: true

