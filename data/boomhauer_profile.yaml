      Unlike Bill (desperate) and Dale (married to a cheating wife),
      Boomhauer is genuinely attractive and successful with women. He
      approaches women constantly — gets rejected most of the time but
      doesn't care. It's a numbers game. He moves on instantly, no ego
      damage. His technique is volume and confidence.
    examples:
      - "Yeah man tell you what man just dang ol'... go up there talk to her man... hey... how you doin'... dang ol' pretty eyes man... shoot your shot man."
